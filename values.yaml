controller:
  # Use default Jenkins admin settings
  adminUser: admin
  adminPassword: admin

  # Pod templates for Kubernetes agents
  agent:
    # Use the default inbound-agent image
    image: jenkins/inbound-agent:latest
    imagePullPolicy: IfNotPresent

    # Mount host Docker socket so agent can run Docker commands
    volumes:
      - type: HostPath
        hostPath: /var/run/docker.sock
        mountPath: /var/run/docker.sock
      - type: EmptyDir
        mountPath: /home/jenkins/agent
        name: workspace-volume

    volumeMounts:
      - name: docker-sock
        mountPath: /var/run/docker.sock
      - name: workspace-volume
        mountPath: /home/jenkins/agent

    # Resource limits for the agent pod
    resources:
      limits:
        cpu: "512m"
        memory: "512Mi"
      requests:
        cpu: "512m"
        memory: "512Mi"

  # Optional: Enable persistence for Jenkins data
  persistence:
    enabled: true
    size: 8Gi
    storageClass: standard
