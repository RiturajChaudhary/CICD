apiVersion: v1
kind: Pod
metadata:
  name: jenkins-dind-agent
  labels:
    app: jenkins-agent
spec:
  containers:
    # 1️⃣ JNLP agent (connects Jenkins master to this pod)
    - name: jnlp
      image: jenkins/inbound-agent:latest
      args: ["${computer.jnlpmac}", "${computer.name}"]
      tty: true

    # 2️⃣ Docker-in-Docker container
    - name: docker
      image: docker:24.0.6-dind
      securityContext:
        privileged: true
      env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
      command:
        - dockerd-entrypoint.sh
      args:
        - --host=tcp://0.0.0.0:2375
        - --host=unix:///var/run/docker.sock
      tty: true

    # 3️⃣ kubectl container for Kubernetes deployment
    - name: kubectl
      image: bitnami/kubectl:latest
      command:
        - cat
      tty: true