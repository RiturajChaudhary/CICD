# jenkins-values.yaml
controller:
  # Use your custom Jenkins image with Docker installed
  image: <your-username>/jenkins-docker
  tag: latest

  # Required for Docker-in-Docker
  securityContext:
    privileged: true

  # Expose Jenkins on port 8080
  containerPort: 8080

  # Mount Docker socket (optional, allows using host Docker)
  volumeMounts:
    - name: docker-sock
      mountPath: /var/run/docker.sock

  volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock

  # Admin credentials (change as needed)
  adminUser: admin
  adminPassword: admin

# Persistence for Jenkins home
persistence:
  enabled: true
  storageClass: standard   # change if needed
  size: 8Gi

# Jenkins service
service:
  type: ClusterIP
  port: 8080

# RBAC
rbac:
  create: true

# Agent configuration
agent:
  enabled: true